services:
  xmlmonitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xmlmonitor
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      # Bind-mount your local scan directory into the container.
      # Change ./scans to any absolute or relative path on the host.
      - ./scans:/scans:ro
    environment:
      - PORT=3001
      - SCANS_DIR=/scans
      - NODE_ENV=production
      # ── Authentication ────────────────────────────────────────
      # IMPORTANT: Change these before deploying!
      # Generate JWT_SECRET with:
      #   node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_USER=${AUTH_USER:-admin}
      - AUTH_PASS=${AUTH_PASS:-admin}
    healthcheck:
      # /api/health is public (no auth required) — safe to use here
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
